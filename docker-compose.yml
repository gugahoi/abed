services:
  abed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abed
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/requests.db
    volumes:
      - ./data:/app/data
    networks:
      - media

networks:
  media:
    external: true
    name: media
